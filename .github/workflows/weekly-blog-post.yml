name: Weekly Blog Post

on:
  schedule:
    - cron: '0 14 * * 1'  # Every Monday at 6am PT (14:00 UTC)
  workflow_dispatch:       # Allow manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Anthropic SDK
        run: npm install @anthropic-ai/sdk

      - name: Generate blog post
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-post.mjs

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_TOKEN }}
          commit-message: "Add draft blog post"
          branch: "blog/draft-${{ github.run_number }}"
          title: "📝 New blog post draft — please review"
          body: |
            A new blog post draft has been generated by the weekly writer.

            **To publish:** Review the post in `content/posts/`, change `published: false` to `published: true`, then merge this PR. The site will update automatically once deployed.

            **To edit:** You can edit the markdown file directly in GitHub before merging.

            **To discard:** Just close this PR without merging.
          labels: blog-draft
